<!-- index.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My GitHub Pages</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>My Project</h1>
    <nav>
      <a href="#about">About</a>
      <a href="#features">Features</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h2>シンプルでクリーンなGitHub Pagesテンプレート</h2>
      <p>index.html と styles.css だけで成立する最小構成</p>
      <button onclick="alert('Hello GitHub Pages!')">Try Me</button>
    </section>

    <section id="about" class="section">
      <h2>About</h2>
      <p>このテンプレートは軽量・高速・可読性重視で設計されています。</p>
    </section>

    <section id="features" class="section grid">
      <div class="card">
        <h3>軽量</h3>
        <p>外部ライブラリなし</p>
      </div>
      <div class="card">
        <h3>レスポンシブ</h3>
        <p>モバイル対応済み</p>
      </div>
      <div class="card">
        <h3>拡張しやすい</h3>
        <p>構造がシンプル</p>
      </div>
    </section>

    <section id="contact" class="section">
      <h2>Contact</h2>
      <p>GitHubのリポジトリからIssueを作成してください。</p>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 My Project</p>
  </footer>
</body>
</html>
