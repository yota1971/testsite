<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>LEDタイマーUI</title>

<style>
body{
    background:#ddd;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
}

/* 外枠 */
.panel{
    display:flex;
    align-items:center;
    gap:20px;
    padding:20px 30px;
    background:linear-gradient(180deg,#1a2230,#0d121c);
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.4) inset,
               0 5px 20px rgba(0,0,0,0.5);
}

/* LEDバー */
.bar{
    display:flex;
    gap:4px;
    padding:10px;
    background:#111;
    border-radius:10px;
    box-shadow:inset 0 0 10px rgba(0,0,0,0.7);
}

/* セグメント */
.seg{
    width:14px;
    height:40px;
    border-radius:3px;
    opacity:1;
    transition:0.2s;
}

/* 消灯 */
.off{
    opacity:0.15;
}

/* 7セグ風表示 */
.display{
    background:#000;
    color:#8ef;
    font-size:48px;
    font-family:monospace;
    padding:10px 20px;
    border-radius:10px;
    letter-spacing:4px;
    box-shadow:inset 0 0 10px rgba(0,200,255,0.4);
}

/* 操作 */
.controls{
    position:absolute;
    bottom:20px;
    text-align:center;
}

input{
    width:70px;
    font-size:16px;
    text-align:center;
}

button{
    padding:5px 10px;
}
</style>
</head>

<body>

<div class="panel">

    <div class="bar" id="bar"></div>

    <div class="display" id="time">12:00</div>

</div>

<div class="controls">
    <input type="number" id="m" placeholder="分">
    <input type="number" id="s" placeholder="秒">
    <button onclick="start()">開始</button>
    <button onclick="stop()">停止</button>
</div>

<script>
const SEG = 20;
let total=0, remain=0, timer=null;

const bar = document.getElementById("bar");
let segs=[];

/* 固定グラデーション（左→右） */
function getFixedColor(i){
    let ratio = i/(SEG-1);

    if(ratio<0.25){
        return "#ff8000"; // orange
    }else if(ratio<0.5){
        return "#aaff00"; // yellow-green
    }else if(ratio<0.75){
        return "#00cc66"; // green
    }else{
        return "#0088ff"; // blue
    }
}

/* セグ生成 */
for(let i=0;i<SEG;i++){
    let d=document.createElement("div");
    d.className="seg";
    d.style.background=getFixedColor(i);
    bar.appendChild(d);
    segs.push(d);
}

/* 表示更新 */
function draw(){
    let m=Math.floor(remain/60);
    let s=remain%60;

    document.getElementById("time").textContent =
        String(m).padStart(2,"0")+":"+
        String(s).padStart(2,"0");

    let ratio = remain/total;
    let onCount = Math.ceil(ratio*SEG);

    segs.forEach((seg,i)=>{
        if(i<onCount){
            seg.classList.remove("off");
        }else{
            seg.classList.add("off");
        }
    });
}

/* 開始 */
function start(){
    let m=parseInt(document.getElementById("m").value)||0;
    let s=parseInt(document.getElementById("s").value)||0;

    total=m*60+s;
    if(total<=0)return;

    remain=total;
    draw();

    clearInterval(timer);
    timer=setInterval(()=>{
        remain--;
        if(remain<=0){
            remain=0;
            clearInterval(timer);
        }
        draw();
    },1000);
}

/* 停止 */
function stop(){
    clearInterval(timer);
}
</script>

</body>
</html>
