<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quad Audio Player + LUFS / CF / RMS / Peak</title>
  <style>
    :root{
      --bg:#0b0f17; --panel:#121a27; --text:#e8eefc; --muted:#9ab0d6;
      --acc:#5dd6ff; --ok:#22c55e; --warn:#ffb86b; --line:rgba(93,214,255,.18);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:linear-gradient(180deg,#070a10,#0b1020);color:var(--text)}
    .wrap{max-width:1280px;margin:14px auto;padding:0 14px 120px}
    h1{font-size:18px;margin:10px 0 12px}
    .topbar,.footerInner,.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:1000px){.grid{grid-template-columns:1fr 1fr}}
    .card{background:rgba(18,26,39,.92);border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.35);padding:12px}
    .slotTitle{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:8px}
    .slotTitle strong{font-size:14px}
    .pill{font-size:12px;color:var(--muted);padding:6px 10px;border-radius:999px;border:1px solid rgba(154,176,214,.25);background:rgba(13,20,34,.45)}
    .pill.value{color:var(--text)}
    .btn{background:#1a263a;border:1px solid rgba(93,214,255,.25);color:var(--text);padding:10px 12px;border-radius:12px;cursor:pointer;min-height:40px;font-weight:600}
    .btn:hover{border-color:rgba(93,214,255,.55)}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .btn.primary{background:linear-gradient(180deg,rgba(93,214,255,.25),rgba(93,214,255,.08));border-color:rgba(93,214,255,.55)}
    .btn.warn{border-color:rgba(255,184,107,.65)}
    .transport .btn.playing{background:linear-gradient(180deg,rgba(34,197,94,.35),rgba(34,197,94,.10));border-color:rgba(34,197,94,.95)!important;box-shadow:0 0 16px rgba(34,197,94,.35)}
    .card.playingCard{border-color:rgba(34,197,94,.5);box-shadow:0 10px 30px rgba(0,0,0,.35),0 0 22px rgba(34,197,94,.12)}
    .muted{color:var(--muted);font-size:12px}
    .metrics,.formatRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:6px}
    .full{width:100%}
    .transport{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px}
    .bar{width:100%;height:9px;border-radius:999px;background:rgba(154,176,214,.18);overflow:hidden}
    .bar > div{height:100%;width:0%;background:linear-gradient(90deg,rgba(93,214,255,.75),rgba(93,214,255,.12))}
    .time{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;font-variant-numeric:tabular-nums;font-size:15px;font-weight:700;color:#dbe8ff}
    input[type="range"]{width:100%}
    .footer{position:fixed;left:0;right:0;bottom:0;padding:10px 12px;background:rgba(10,14,24,.88);backdrop-filter:blur(10px);border-top:1px solid rgba(154,176,214,.18)}
    .footerInner{max-width:1280px;margin:0 auto;justify-content:space-between}
    .hint{display:flex;gap:10px;flex-wrap:wrap;align-items:center;color:var(--muted);font-size:12px}
    kbd{background:#0d1422;border:1px solid rgba(154,176,214,.25);border-bottom-width:2px;border-radius:8px;padding:2px 6px;font-size:12px;color:var(--text)}
    .right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .miniNum{width:100px;background:#0d1422;color:var(--text);border:1px solid rgba(154,176,214,.25);border-radius:10px;padding:7px 9px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Quad Audio Player + LUFS / Crest Factor / RMS / Peak</h1>
    <div class="topbar" style="margin:8px 0 12px;">
      <span class="pill">読み込み後に各 Deck の <b>LUFS-I / CF / RMS / Peak</b> を同時表示します（LUFS-I は近似値）。</span>
      <span class="pill" id="audioState">Audio: not created</span>
      <span class="pill" id="sr">SR: -</span>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="footer">
    <div class="footerInner">
      <div class="row">
        <button class="btn primary" id="direct1">1</button>
        <button class="btn primary" id="direct2">2</button>
        <button class="btn primary" id="direct3">3</button>
        <button class="btn primary" id="direct4">4</button>
        <button class="btn warn" id="allStop">STOP</button>
        <span class="pill">Fade(ms)
          <input id="fadeMs" class="miniNum" type="number" min="0" max="5000" step="10" value="120" />
        </span>
      </div>
      <div class="hint">
        <span><kbd>1</kbd>〜<kbd>4</kbd>=再生 / <kbd>Space</kbd>=停止 / Stopボタン=全停止</span>
      </div>
    </div>
  </div>

  <script>
  (() => {
    const CONFIG = {
      DECK_COUNT: 4,
      STOP_DELAY_PADDING_MS: 30,
      MAX_FADE_SECONDS: 5,
      UI_SHAKE_MS: 200,
      LUFS_GATE_ABS: -70,
      LUFS_GATE_REL_OFFSET: 10
    };

    const grid = document.getElementById('grid');
    const clamp = (v,a,b)=>Math.min(b,Math.max(a,v));
    const fmt = (sec)=>{
      if (!isFinite(sec)) return '--:--.---';
      const m=Math.floor(sec/60), s=Math.floor(sec%60), ms=Math.floor((sec-Math.floor(sec))*1000);
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
    };
    const safeDb = (v)=>20*Math.log10(Math.max(v,1e-12));
    const safePowDb = (v)=>10*Math.log10(Math.max(v,1e-18));
    const dbToGain=(db)=>Math.pow(10,db/20);

    let ac = null;
    function setAudioStateLabel(){
      const el = document.getElementById('audioState');
      if (!el) return;
      if (!ac) { el.textContent='Audio: not created'; return; }
      el.textContent = `Audio: ${ac.state}`;
    }
    function ensureAC(){
      if (!ac) {
        ac = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('sr').textContent = `SR: ${ac.sampleRate} Hz`;
        ac.onstatechange = ()=>setAudioStateLabel();
      }
      if (ac.state === 'suspended') ac.resume().catch(()=>{});
      setAudioStateLabel();
    }
    function now(){ return ac ? ac.currentTime : 0; }
    function fadeSeconds(){
      const ms = parseFloat(document.getElementById('fadeMs').value || '0');
      return clamp(ms/1000, 0, CONFIG.MAX_FADE_SECONDS);
    }

    function guessContainerByNameAndType(file){
      const name=(file?.name||'').toLowerCase();
      const type=(file?.type||'').toLowerCase();
      if (name.endsWith('.flac') || type==='audio/flac' || type==='audio/x-flac') return 'FLAC';
      if (name.endsWith('.wav') || type==='audio/wav' || type==='audio/wave' || type==='audio/x-wav') return 'WAV';
      if (name.endsWith('.mp3') || type==='audio/mpeg') return 'MP3';
      if (name.endsWith('.m4a') || name.endsWith('.mp4') || type==='audio/mp4' || type==='video/mp4') return 'MP4/M4A';
      if (name.endsWith('.ogg') || type==='audio/ogg') return 'OGG';
      return type ? type.toUpperCase() : 'unknown';
    }
    function parseWavHeader(ab){
      const dv = new DataView(ab);
      const r4 = o => String.fromCharCode(dv.getUint8(o), dv.getUint8(o+1), dv.getUint8(o+2), dv.getUint8(o+3));
      if (dv.byteLength < 12 || r4(0) !== 'RIFF' || r4(8) !== 'WAVE') return null;
      let off=12;
      while (off + 8 <= dv.byteLength) {
        const id = r4(off), sz = dv.getUint32(off+4,true), d = off+8;
        if (id === 'fmt ' && d + 16 <= dv.byteLength) {
          return {
            channels: dv.getUint16(d+2,true),
            sampleRate: dv.getUint32(d+4,true),
            bitsPerSample: dv.getUint16(d+14,true)
          };
        }
        off = d + sz + (sz % 2);
      }
      return null;
    }
    function parseFlacStreamInfo(ab){
      const u = new Uint8Array(ab);
      const r4 = o => String.fromCharCode(u[o], u[o+1], u[o+2], u[o+3]);
      if (u.length < 42 || r4(0) !== 'fLaC') return null;
      const si = 8;
      const b = (u[si+10] << 24) | (u[si+11] << 16) | (u[si+12] << 8) | u[si+13];
      return {
        sampleRate: (b >>> 12) & 0xFFFFF,
        channels: ((b >>> 9) & 7) + 1,
        bitsPerSample: ((b >>> 4) & 31) + 1
      };
    }
    async function sniffAudioFormat(file){
      const c = guessContainerByNameAndType(file);
      const ab = await file.slice(0, Math.min(file.size, 2*1024*1024)).arrayBuffer();
      const o = { container:c, codec:'-', sampleRate:null, bitDepth:null, channels:null, bitrateKbps:null };
      if (c === 'WAV') {
        const w = parseWavHeader(ab);
        o.codec = 'Linear PCM';
        if (w) {
          o.sampleRate = w.sampleRate;
          o.bitDepth = w.bitsPerSample;
          o.channels = w.channels;
        }
      } else if (c === 'FLAC') {
        const f = parseFlacStreamInfo(ab);
        o.codec = 'FLAC';
        if (f) {
          o.sampleRate = f.sampleRate;
          o.bitDepth = f.bitsPerSample;
          o.channels = f.channels;
        }
      } else if (c === 'MP3') {
        o.codec = 'MP3';
      } else if (c === 'MP4/M4A') {
        o.codec = 'AAC/MP4';
      }
      return o;
    }

    function biquadCoeffsHighpass(fc, q, fs) {
      const w0 = 2 * Math.PI * fc / fs;
      const cosw0 = Math.cos(w0);
      const sinw0 = Math.sin(w0);
      const alpha = sinw0 / (2 * q);
      const b0 = (1 + cosw0) / 2;
      const b1 = -(1 + cosw0);
      const b2 = (1 + cosw0) / 2;
      const a0 = 1 + alpha;
      const a1 = -2 * cosw0;
      const a2 = 1 - alpha;
      return { b0: b0 / a0, b1: b1 / a0, b2: b2 / a0, a1: a1 / a0, a2: a2 / a0 };
    }
    function biquadCoeffsHighShelf(fc, gainDb, fs, slope = 1) {
      const A = Math.pow(10, gainDb / 40);
      const w0 = 2 * Math.PI * fc / fs;
      const cosw0 = Math.cos(w0);
      const sinw0 = Math.sin(w0);
      const alpha = sinw0 / 2 * Math.sqrt((A + 1 / A) * (1 / slope - 1) + 2);
      const sqrtA = Math.sqrt(A);
      const b0 = A * ((A + 1) + (A - 1) * cosw0 + 2 * sqrtA * alpha);
      const b1 = -2 * A * ((A - 1) + (A + 1) * cosw0);
      const b2 = A * ((A + 1) + (A - 1) * cosw0 - 2 * sqrtA * alpha);
      const a0 = (A + 1) - (A - 1) * cosw0 + 2 * sqrtA * alpha;
      const a1 = 2 * ((A - 1) - (A + 1) * cosw0);
      const a2 = (A + 1) - (A - 1) * cosw0 - 2 * sqrtA * alpha;
      return { b0: b0 / a0, b1: b1 / a0, b2: b2 / a0, a1: a1 / a0, a2: a2 / a0 };
    }
    function biquadProcessInPlace(samples, c) {
      let x1=0,x2=0,y1=0,y2=0;
      for (let i=0;i<samples.length;i++) {
        const x0=samples[i];
        const y0=c.b0*x0 + c.b1*x1 + c.b2*x2 - c.a1*y1 - c.a2*y2;
        samples[i]=y0;
        x2=x1; x1=x0; y2=y1; y1=y0;
      }
    }
    function estimateIntegratedLufsApprox(audioBuffer) {
      const fs = audioBuffer.sampleRate;
      const chCount = Math.min(audioBuffer.numberOfChannels, 2);
      if (chCount <= 0) return null;
      const hp = biquadCoeffsHighpass(38, 0.5, fs);
      const hs = biquadCoeffsHighShelf(1500, 4.0, fs, 1);
      const filtered = [];
      for (let ch = 0; ch < chCount; ch++) {
        const arr = new Float32Array(audioBuffer.getChannelData(ch));
        biquadProcessInPlace(arr, hp);
        biquadProcessInPlace(arr, hs);
        filtered.push(arr);
      }
      const block = Math.max(1, Math.round(0.400 * fs));
      const hop = Math.max(1, Math.round(0.100 * fs));
      const blockPowers = [];
      for (let start = 0; start + block <= audioBuffer.length; start += hop) {
        let sum = 0;
        for (let ch = 0; ch < filtered.length; ch++) {
          const data = filtered[ch];
          let s = 0;
          for (let i = 0; i < block; i++) {
            const v = data[start + i];
            s += v * v;
          }
          sum += s / block;
        }
        blockPowers.push(sum / filtered.length);
      }
      if (!blockPowers.length) return null;
      const absGated = blockPowers.filter(ms => (-0.691 + safePowDb(ms)) > CONFIG.LUFS_GATE_ABS);
      if (!absGated.length) return CONFIG.LUFS_GATE_ABS;
      const absMean = absGated.reduce((a,b)=>a+b,0) / absGated.length;
      const relGate = (-0.691 + safePowDb(absMean)) - CONFIG.LUFS_GATE_REL_OFFSET;
      const relGated = absGated.filter(ms => (-0.691 + safePowDb(ms)) > relGate);
      const finalSet = relGated.length ? relGated : absGated;
      const finalMean = finalSet.reduce((a,b)=>a+b,0) / finalSet.length;
      return -0.691 + safePowDb(finalMean);
    }
    async function analyzeLoudnessAndCrest(file) {
      ensureAC();
      const ab = await file.arrayBuffer();
      const decoded = await ac.decodeAudioData(ab.slice(0));
      let peak = 0;
      let sumSq = 0;
      let n = 0;
      for (let ch = 0; ch < decoded.numberOfChannels; ch++) {
        const data = decoded.getChannelData(ch);
        for (let i = 0; i < data.length; i++) {
          const v = data[i];
          const av = Math.abs(v);
          if (av > peak) peak = av;
          sumSq += v * v;
        }
        n += data.length;
      }
      const rms = n > 0 ? Math.sqrt(sumSq / n) : 0;
      const crestDb = safeDb(peak) - safeDb(rms);
      const lufsIntegrated = estimateIntegratedLufsApprox(decoded);
      return {
        lufsIntegrated: Number.isFinite(lufsIntegrated) ? lufsIntegrated : null,
        crestDb: Number.isFinite(crestDb) ? crestDb : null,
        peakDbfs: Number.isFinite(peak) ? safeDb(peak) : null,
        rmsDbfs: Number.isFinite(rms) ? safeDb(rms) : null,
        note: 'approx-bs1770'
      };
    }

    function fileMetaOf(file){
      return file ? {
        name: file.name ?? null,
        type: file.type ?? null,
        size: typeof file.size === 'number' ? file.size : null,
        lastModified: typeof file.lastModified === 'number' ? file.lastModified : null,
      } : null;
    }

    let currentlyPlayingIndex = null;
    let lastSelectedIndex = 1;

    class Deck {
      constructor(index) {
        this.index = index;
        this.currentFileMeta = null;
        this.lastObjectURL = null;
        this.analysisInfo = null;
        this._sniffInfo = null;
        this.audio = null;
        this.mediaSrc = null;
        this.fadeGain = null;
        this.userGain = null;
        this.meterAnalyser = null;
        this.meterBuf = null;
        this.lastMeterTs = 0;
        this.build();
        this.bind();
      }
      build() {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <div class="slotTitle">
            <strong>DECK ${this.index}</strong>
            <span class="pill statusPill">未読み込み</span>
          </div>
          <audio preload="metadata" style="display:none"></audio>
          <div class="row full">
            <input class="fileInput" type="file" accept="audio/*" />
            <span class="pill time">00:00.000 / 00:00.000</span>
          </div>
          <div class="muted fileInfo" style="margin-top:6px;">ファイルを選択してください</div>
          <div class="formatRow">
            <span class="pill fmtPill">FMT: -</span>
            <span class="pill codecPill">CODEC: -</span>
            <span class="pill brPill">BR: -</span>
            <span class="pill srPill">SR: -</span>
            <span class="pill bdPill">BIT: -</span>
            <span class="pill chPill">CH: -</span>
          </div>
          <div class="metrics">
            <span class="pill lufsPill">LUFS-I: -</span>
            <span class="pill cfPill">Crest Factor: -</span>
            <span class="pill rmsPill">RMS: -</span>
            <span class="pill peakPill">Peak: -</span>
          </div>
          <div class="transport">
            <button class="btn primary playBtn" disabled>▶</button>
            <button class="btn pauseBtn" disabled>⏸</button>
            <button class="btn stopBtn" disabled>⏹</button>
            <span class="pill value muteState">Mute: OFF</span>
          </div>
          <div class="row full" style="margin-top:8px;">
            <input class="seek" type="range" min="0" max="1000" value="0" step="1" disabled />
            <div class="bar"><div class="meter"></div></div>
          </div>
        `;
        this.el = div;
        this.audio = div.querySelector('audio');
        this.statusPill = div.querySelector('.statusPill');
        this.fileInput = div.querySelector('.fileInput');
        this.fileInfo = div.querySelector('.fileInfo');
        this.timeEl = div.querySelector('.time');
        this.playBtn = div.querySelector('.playBtn');
        this.pauseBtn = div.querySelector('.pauseBtn');
        this.stopBtn = div.querySelector('.stopBtn');
        this.seek = div.querySelector('.seek');
        this.meter = div.querySelector('.meter');
        this.muteState = div.querySelector('.muteState');
        this.fmtPill = div.querySelector('.fmtPill');
        this.codecPill = div.querySelector('.codecPill');
        this.brPill = div.querySelector('.brPill');
        this.srPill = div.querySelector('.srPill');
        this.bdPill = div.querySelector('.bdPill');
        this.chPill = div.querySelector('.chPill');
        this.lufsPill = div.querySelector('.lufsPill');
        this.cfPill = div.querySelector('.cfPill');
        this.rmsPill = div.querySelector('.rmsPill');
        this.peakPill = div.querySelector('.peakPill');
        grid.appendChild(div);
      }
      setStatus(text){ this.statusPill.textContent = text; }
      setVisualPlaying(on){
        this.playBtn.classList.toggle('playing', on);
        this.el.classList.toggle('playingCard', on);
      }
      hasFile(){ return !!this.audio.src; }
      isPlaying(){ return !this.audio.paused && !this.audio.ended && !!this.audio.src; }
      setEnabled(enabled){
        this.playBtn.disabled = !enabled || this.isPlaying();
        this.pauseBtn.disabled = !enabled || !this.isPlaying();
        this.stopBtn.disabled = !enabled;
        this.seek.disabled = !enabled;
      }
      updateTime(){
        const cur = this.audio.currentTime || 0;
        const dur = isFinite(this.audio.duration) ? this.audio.duration : 0;
        this.timeEl.textContent = `${fmt(cur)} / ${fmt(dur)}`;
        const pct = dur > 0 ? clamp(cur / dur * 100, 0, 100) : 0;
        this.seek.value = dur > 0 ? String(Math.round(cur / dur * 1000)) : '0';
        this.meter.style.width = `${pct.toFixed(1)}%`;
      }
      setFormatPills(info){
        if (!info) {
          this.fmtPill.textContent='FMT: -'; this.codecPill.textContent='CODEC: -'; this.brPill.textContent='BR: -';
          this.srPill.textContent='SR: -'; this.bdPill.textContent='BIT: -'; this.chPill.textContent='CH: -';
          return;
        }
        this.fmtPill.textContent = `FMT: ${info.container || '-'}`;
        this.codecPill.textContent = `CODEC: ${info.codec || '-'}`;
        this.brPill.textContent = `BR: ${Number.isFinite(info.bitrateKbps) ? Math.round(info.bitrateKbps) + ' kbps' : '-'}`;
        this.srPill.textContent = `SR: ${Number.isFinite(info.sampleRate) ? Math.round(info.sampleRate) + ' Hz' : '-'}`;
        this.bdPill.textContent = `BIT: ${Number.isFinite(info.bitDepth) ? Math.round(info.bitDepth) + ' bit' : '-'}`;
        this.chPill.textContent = `CH: ${Number.isFinite(info.channels) ? Math.round(info.channels) + ' ch' : '-'}`;
      }
      setMeasurementPills(info){
        this.analysisInfo = info || null;
        if (!info) {
          this.lufsPill.textContent = 'LUFS-I: -';
          this.cfPill.textContent = 'Crest Factor: -';
          this.rmsPill.textContent = 'RMS: -';
          this.peakPill.textContent = 'Peak: -';
          return;
        }
        this.lufsPill.textContent = `LUFS-I: ${Number.isFinite(info.lufsIntegrated) ? info.lufsIntegrated.toFixed(1) + ' LUFS' : '-'}`;
        this.cfPill.textContent = `Crest Factor: ${Number.isFinite(info.crestDb) ? info.crestDb.toFixed(1) + ' dB' : '-'}`;
        this.rmsPill.textContent = `RMS: ${Number.isFinite(info.rmsDbfs) ? info.rmsDbfs.toFixed(1) + ' dBFS' : '-'}`;
        this.peakPill.textContent = `Peak: ${Number.isFinite(info.peakDbfs) ? info.peakDbfs.toFixed(1) + ' dBFS' : '-'}`;
      }
      ensureNodes(){
        ensureAC();
        if (!this.fadeGain) {
          this.fadeGain = ac.createGain();
          this.fadeGain.gain.value = 0;
          this.userGain = ac.createGain();
          this.userGain.gain.value = dbToGain(0);
          this.meterAnalyser = ac.createAnalyser();
          this.meterAnalyser.fftSize = 256;
          this.meterBuf = new Uint8Array(this.meterAnalyser.fftSize);
          this.fadeGain.connect(this.userGain);
          this.userGain.connect(this.meterAnalyser);
          this.meterAnalyser.connect(ac.destination);
        }
        if (!this.mediaSrc && this.audio) {
          this.mediaSrc = ac.createMediaElementSource(this.audio);
          this.mediaSrc.connect(this.fadeGain);
        }
      }
      fadeTo(target, sec){
        this.ensureNodes();
        const t = now();
        const g = this.fadeGain.gain;
        g.cancelScheduledValues(t);
        try { g.setValueAtTime(g.value, t); } catch (_) {}
        g.linearRampToValueAtTime(clamp(target,0,1), t + Math.max(0.001, sec));
      }
      async assignFile(file){
        if (!file) return;
        ensureAC();
        if (this.lastObjectURL) {
          try { URL.revokeObjectURL(this.lastObjectURL); } catch (_) {}
        }
        this.currentFileMeta = fileMetaOf(file);
        this.setMeasurementPills(null);
        this.setFormatPills(null);
        this.fileInfo.textContent = `${file.name}（${(file.size / 1024 / 1024).toFixed(2)} MB）`;
        this.setStatus('読み込み中...');

        const url = URL.createObjectURL(file);
        this.lastObjectURL = url;
        this.audio.src = url;
        this.audio.load();
        this.ensureNodes();

        try {
          const fmtInfo = await sniffAudioFormat(file);
          this._sniffInfo = fmtInfo;
          this.setFormatPills(fmtInfo);
        } catch (_) {
          this.setFormatPills({container:guessContainerByNameAndType(file),codec:'-',sampleRate:null,bitDepth:null,channels:null,bitrateKbps:null});
        }

        try {
          const metrics = await analyzeLoudnessAndCrest(file);
          if (this.currentFileMeta && this.currentFileMeta.name === file.name && this.currentFileMeta.size === file.size) {
            this.setMeasurementPills(metrics);
          }
        } catch (e) {
          console.warn('analysis failed', e);
          this.setMeasurementPills(null);
        }

        this.audio.oncanplay = () => {
          try {
            const d = this.audio.duration;
            if (d > 0 && this.brPill && file.size > 0) {
              const kbps = file.size * 8 / d / 1000;
              this.brPill.textContent = `BR: ${Math.round(kbps)} kbps (est)`;
            }
          } catch (_) {}
          this.setStatus('停止/待機');
          this.updateTime();
          this.setEnabled(true);
        };
        this.audio.onerror = () => {
          this.setStatus('読み込み失敗');
          this.fileInfo.textContent = 'この形式はブラウザで再生できない可能性があります。';
          this.setEnabled(false);
          this.setVisualPlaying(false);
        };
      }
      async play(startMode='current'){
        if (!this.hasFile()) return;
        ensureAC();
        const fade = fadeSeconds();
        this.fadeTo(0, 0.001);
        await this.audio.play().catch(()=>{});
        this.fadeTo(1, fade);
        this.setStatus('再生中');
        this.setEnabled(true);
      }
      pause(){
        if (!this.hasFile()) return;
        const fade = fadeSeconds();
        this.fadeTo(0, fade);
        const a = this.audio;
        window.setTimeout(()=>{ a.pause(); }, Math.max(0, fade*1000 + CONFIG.STOP_DELAY_PADDING_MS));
        this.setStatus('停止/待機');
      }
      stop(){
        if (!this.hasFile()) return;
        const fade = fadeSeconds();
        this.fadeTo(0, fade);
        const a = this.audio;
        window.setTimeout(()=>{ a.pause(); try { a.currentTime = 0; } catch (_) {} this.updateTime(); }, Math.max(0, fade*1000 + CONFIG.STOP_DELAY_PADDING_MS));
        this.setStatus('停止/待機');
      }
      stopImmediate(){
        if (this.audio.src) {
          this.audio.pause();
          try { this.audio.currentTime = 0; } catch (_) {}
        }
        if (this.fadeGain) {
          const t = now();
          const g = this.fadeGain.gain;
          g.cancelScheduledValues(t);
          try { g.setValueAtTime(0, t); } catch (_) {}
        }
        this.updateTime();
        this.setStatus(this.audio.src ? '停止/待機' : '未読み込み');
        this.setEnabled(!!this.audio.src);
      }
      bind(){
        this.fileInput.addEventListener('change', e => {
          const f = e.target.files && e.target.files[0];
          if (f) this.assignFile(f);
        });
        this.playBtn.onclick = async () => { await requestPlayDeck(this.index, { startMode: 'current' }); };
        this.pauseBtn.onclick = () => requestPauseDeck(this.index);
        this.stopBtn.onclick = () => requestStopDeck(this.index);
        this.seek.oninput = e => {
          if (!isFinite(this.audio.duration) || this.audio.duration <= 0) return;
          const v = parseFloat(e.target.value) / 1000;
          const pos = clamp(v * this.audio.duration, 0, this.audio.duration);
          this.timeEl.textContent = `${fmt(pos)} / ${fmt(this.audio.duration)}`;
        };
        this.seek.onchange = e => {
          if (!isFinite(this.audio.duration) || this.audio.duration <= 0) return;
          const v = parseFloat(e.target.value) / 1000;
          const pos = clamp(v * this.audio.duration, 0, this.audio.duration);
          try { this.audio.currentTime = pos; } catch (_) {}
          this.updateTime();
        };
        this.audio.addEventListener('timeupdate', () => this.updateTime());
        this.audio.addEventListener('loadedmetadata', () => this.updateTime());
        this.audio.addEventListener('play', () => {
          currentlyPlayingIndex = this.index;
          lastSelectedIndex = this.index;
          updateNowPlayingUI();
          this.setEnabled(true);
          this.setStatus('再生中');
        });
        this.audio.addEventListener('pause', () => {
          this.setEnabled(!!this.audio.src);
          if (currentlyPlayingIndex === this.index && !this.isPlaying()) {
            currentlyPlayingIndex = null;
            updateNowPlayingUI();
          }
        });
        this.audio.addEventListener('ended', () => {
          this.setEnabled(!!this.audio.src);
          if (currentlyPlayingIndex === this.index) {
            currentlyPlayingIndex = null;
            updateNowPlayingUI();
          }
        });
      }
    }

    const decks = [];
    for (let i=1; i<=CONFIG.DECK_COUNT; i++) decks.push(new Deck(i));

    function updateNowPlayingUI(){
      decks.forEach((d, idx) => d.setVisualPlaying(currentlyPlayingIndex === (idx + 1)));
    }

    async function requestPlayDeck(i, { startMode='current' } = {}) {
      ensureAC();
      lastSelectedIndex = i;
      const target = decks[i - 1];
      if (!target || !target.hasFile()) {
        if (target) {
          target.setStatus('ファイル未設定');
          target.el.animate([
            { transform:'translateX(0)' },
            { transform:'translateX(-3px)' },
            { transform:'translateX(3px)' },
            { transform:'translateX(0)' }
          ], { duration: CONFIG.UI_SHAKE_MS });
        }
        return;
      }
      if (currentlyPlayingIndex === i && target.isPlaying()) {
        requestStopDeck(i);
        return;
      }
      const fade = fadeSeconds();
      decks.forEach((d, idx) => {
        const n = idx + 1;
        if (n !== i && d.hasFile()) {
          if (d.isPlaying()) d.stop();
        }
      });
      currentlyPlayingIndex = i;
      updateNowPlayingUI();
      await target.play(startMode);
    }
    function requestPauseDeck(i) {
      const d = decks[i - 1];
      if (d) d.pause();
    }
    function requestStopDeck(i) {
      const d = decks[i - 1];
      if (d) d.stop();
      if (currentlyPlayingIndex === i) {
        window.setTimeout(() => {
          if (!decks[i - 1].isPlaying()) {
            currentlyPlayingIndex = null;
            updateNowPlayingUI();
          }
        }, CONFIG.STOP_DELAY_PADDING_MS);
      }
    }
    function hardStopAll() {
      decks.forEach(d => d.stopImmediate());
      currentlyPlayingIndex = null;
      updateNowPlayingUI();
    }

    [1,2,3,4].forEach(n => {
      document.getElementById(`direct${n}`).onclick = () => requestPlayDeck(n, { startMode:'current' });
    });
    document.getElementById('allStop').onclick = () => hardStopAll();
    window.addEventListener('keydown', e => {
      const tag = e.target && e.target.tagName;
      if (tag === 'INPUT' || tag === 'SELECT' || (e.target && e.target.isContentEditable)) return;
      if (e.code === 'Digit1') { e.preventDefault(); requestPlayDeck(1, { startMode:'current' }); }
      if (e.code === 'Digit2') { e.preventDefault(); requestPlayDeck(2, { startMode:'current' }); }
      if (e.code === 'Digit3') { e.preventDefault(); requestPlayDeck(3, { startMode:'current' }); }
      if (e.code === 'Digit4') { e.preventDefault(); requestPlayDeck(4, { startMode:'current' }); }
      if (e.code === 'Space') {
        e.preventDefault();
        e.stopPropagation();
        hardStopAll();
      }
    }, true);

    setAudioStateLabel();
  })();
  </script>
</body>
</html>
